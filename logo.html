<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responsive Navbar</title>
  <style>
    :root {
      --navbar-bg: #05f8f4;
      --link-color: #ff0000;
      --link-hover: #cc0000;
      --brand-color: #ffffff;
      --navbar-height: 70px;
      --shadow-color: rgba(0, 0, 0, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      position: relative;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background-color: #b8e2b265;
      color: #222;
      overflow-x: hidden;
    }

    .watermark {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 0;
      opacity: 0.08;
    }

    .watermark img {
      max-width: 70%;
      max-height: 70%;
      object-fit: contain;
    }

    .navbar {
      position: sticky;
      top: 0;
      width: 100%;
      background-color: var(--navbar-bg);
      color: var(--brand-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      min-height: var(--navbar-height);
      box-shadow: 0 4px 12px var(--shadow-color);
      z-index: 100;
    }

    .navbar__brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .navbar__brand img {
      width: 38px;
      height: 38px;
      object-fit: contain;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.15);
      padding: 6px;
    }

    .navbar__links {
      display: flex;
      gap: 28px;
      list-style: none;
      align-items: center;
    }

    .navbar__links a {
      color: var(--link-color);
      text-decoration: none;
      font-size: 0.98rem;
      padding: 10px 12px;
      border-radius: 8px;
      transition: color 0.22s ease, transform 0.22s ease, box-shadow 0.22s ease;
    }

    .navbar__links a:hover,
    .navbar__links a:focus-visible {
      color: var(--link-hover);
      transform: translateY(-3px);
      box-shadow: 0 10px 18px rgba(0, 0, 0, 0.12);
    }

    .hero {
      max-width: 900px;
      margin: 48px auto;
      padding: 0 24px;
      text-align: center;
    }

    .hero h1 {
      margin-bottom: 16px;
      font-size: clamp(2rem, 3vw, 3rem);
    }

    .hero p {
      font-size: 1rem;
      line-height: 1.8;
      color: #f2765d;
    }

    @media (max-width: 640px) {
      .navbar {
        flex-direction: column;
        align-items: stretch;
        padding: 12px 18px;
      }

      .navbar__brand {
        justify-content: center;
      }

      .navbar__links {
        flex-wrap: wrap;
        justify-content: center;
        gap: 16px;
        margin-top: 12px;
      }
    }
  </style>
</head>
<body>
  <header class="navbar">
    <a href="#" class="navbar__brand">
      <img src="logo.jpg" alt="Brand logo" />
      <span>Talentz</span>
    </a>
    <nav>
      <ul class="navbar__links">
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <div class="watermark">
    <img src="logo.jpg" alt="Brand watermark" />
  </div>

  <main class="hero" id="home">
    <h1>Responsive Navigation Bar</h1>
    <p>
      This example shows a clean blue navbar with the brand on the left and aligned navigation links on the right. Hovering over each link changes the color and adds a subtle lift effect.
    </p>
  </main>

  
  </section>
</body>
</html>
