<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Google Clone</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fff;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
}

/* LEFT NAV */
.header-left a {
    margin-right: 15px;
    text-decoration: none;
    color: #202124;
    font-size: 14px;
}

.header-left a:hover {
    text-decoration: underline;
}

/* RIGHT NAV */
.header-right {
    display: flex;
    align-items: center;
}

.header-right a {
    margin-left: 15px;
    text-decoration: none;
    color: #202124;
    font-size: 14px;
}

.header-right a:hover {
    text-decoration: underline;
}

.profile {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #5f6368;
    margin-left: 15px;
}

/* MAIN */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* LOGO */
.logo {
    font-size: 70px;
    letter-spacing: -3px;
}

.logo span:nth-child(1){color:#4285F4;}
.logo span:nth-child(2){color:#EA4335;}
.logo span:nth-child(3){color:#FBBC05;}
.logo span:nth-child(4){color:#4285F4;}
.logo span:nth-child(5){color:#34A853;}
.logo span:nth-child(6){color:#EA4335;}

/* SEARCH */
.search-container {
    margin-top: 25px;
    width: 500px;
    max-width: 90%;
    position: relative;
}

.search-box {
    width: 100%;
    padding: 12px 110px 12px 45px;
    border-radius: 30px;
    border: 1px solid #dfe1e5;
    font-size: 16px;
    outline: none;
}

.search-box:hover {
    box-shadow: 0 1px 6px rgba(32,33,36,0.28);
}

/* ICONS */
.search-icon {
    position: absolute;
    left: 15px;
    top: 11px;
}

.mic-icon {
    position: absolute;
    right: 45px;
    top: 11px;
    cursor: pointer;
}

.camera-icon {
    position: absolute;
    right: 15px;
    top: 11px;
    cursor: pointer;
}

/* BUTTONS */
.buttons {
    margin-top: 25px;
}

.buttons button {
    padding: 10px 18px;
    margin: 5px;
    border: 1px solid transparent;
    border-radius: 4px;
    background: #f8f9fa;
    cursor: pointer;
}

.buttons button:hover {
    border: 1px solid #dadce0;
    box-shadow: 0 1px 1px rgba(0,0,0,0.1);
}

/* FOOTER */
.footer {
    background: #f2f2f2;
    font-size: 14px;
}

.footer-top {
    padding: 10px 20px;
    border-bottom: 1px solid #dadce0;
}

.footer-bottom {
    display: flex;
    justify-content: space-between;
    padding: 10px 20px;
}

.footer a {
    margin-right: 15px;
    text-decoration: none;
    color: #70757a;
}

.footer a:hover {
    text-decoration: underline;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

    <!-- LEFT SIDE -->
    <div class="header-left">
        <a href="https://en.wikipedia.org/wiki/Google">About</a>
        <a href="https://store.google.com/">Store</a>
    </div>

    <!-- RIGHT SIDE -->
    <div class="header-right">
        <a href="https://mail.google.com/">Gmail</a>
        <a href="https://www.google.com/imghp">Images</a>
        <div class="profile"></div>
    </div>

</div>

<!-- MAIN -->
<div class="main">

    <div class="logo">
        <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
    </div>

    <div class="search-container">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-box">
        <span class="mic-icon">🎤</span>
        <span class="camera-icon">📷</span>
    </div>

    <div class="buttons">
        <button>Google Search</button>
        <button>I'm Feeling Lucky</button>
    </div>

</div>

<!-- FOOTER -->
<div class="footer">
    <div class="footer-top">India</div>
    <div class="footer-bottom">
        <div>
            <a href="#">About</a>
            <a href="#">Advertising</a>
            <a href="#">Business</a>
        </div>
        <div>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
            <a href="#">Settings</a>
        </div>
    </div>
</div>

</body>
</html>
