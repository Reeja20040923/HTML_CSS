<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Details</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            text-align: center;
        }

        h2 {
            margin-top: 30px;
        }

        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 60%;
        }

        table, th, td {
            border: 1px solid black;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
    </style>

</head>
<body>

    <h2>Employee Details Table</h2>

    <table>
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>City</th>
        </tr>

        <tr>
            <td>Reeja</td>
            <td>21</td>
            <td>Hyderabad</td>
        </tr>

        <tr>
            <td>Vani</td>
            <td>25</td>
            <td>Bangalore</td>
        </tr>

        <tr>
            <td>Anjali</td>
            <td>23</td>
            <td>Chennai</td>
        </tr>

    </table>

</body>
</html>
