<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Gallery</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        h2 {
            text-align: center;
            padding: 20px;
        }

        /* Grid Layout */
        .gallery {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 20px;
        }

        /* Image Card */
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
        }

        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        /* Zoom Effect */
        .gallery-item:hover img {
            transform: scale(1.1);
        }

        /* Overlay */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s ease;
            font-size: 18px;
        }

        .gallery-item:hover .overlay {
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 992px) {
            .gallery {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 576px) {
            .gallery {
                grid-template-columns: repeat(1, 1fr);
            }
        }
    </style>
</head>
<body>

    <h2>Image Gallery</h2>

    <div class="gallery">

        <div class="gallery-item">
            <img src="https://picsum.photos/400/300?1" alt="">
            <div class="overlay">Image 1</div>
        </div>

        <div class="gallery-item">
            <img src="https://picsum.photos/400/300?2" alt="">
            <div class="overlay">Image 2</div>
        </div>

        <div class="gallery-item">
            <img src="https://picsum.photos/400/300?3" alt="">
            <div class="overlay">Image 3</div>
        </div>

        <div class="gallery-item">
            <img src="https://picsum.photos/400/300?4" alt="">
            <div class="overlay">Image 4</div>
        </div>

        <div class="gallery-item">
            <img src="https://picsum.photos/400/300?5" alt="">
            <div class="overlay">Image 5</div>
        </div>

        <div class="gallery-item">
            <img src="https://picsum.photos/400/300?6" alt="">
            <div class="overlay">Image 6</div>
        </div>

    </div>

</body>
</html>
