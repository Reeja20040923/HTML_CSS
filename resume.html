<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Resume Profile</title>
    <style>
        body {
            background-color: #f2f6fc;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: white;
            padding: 30px;
            width: 350px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
        }

        h2 {
            margin: 10px 0;
        }

        p {
            color: #555;
            font-size: 14px;
        }

        .section {
            margin-top: 15px;
        }

        .skills span {
            display: inline-block;
            background-color: #007bff;
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            margin: 5px;
            font-size: 12px;
        }

        a {
            text-decoration: none;
            color: #007bff;
        }
        a:visited{
            color:red;
        }
        a:hover{
            color:magenta;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="Reeja new.jpg" alt="Profile Image" class="profile-img">
    <h2>Yaramalla Reeja</h2>

    <div class="section">
        <p><strong>Phone:</strong> 123456789</p>
        <p><strong>Email:</strong> reeja@email.com</p>
        <p><strong>Address:</strong> Hyderabad</p>
        <p><strong>LinkedIn:</strong> <a href="https://www.linkedin.com/in/reejayaramalla2329" target="_blank"> linkedin.com/in/reejayaramalla2329</a></p>
    </div>

    <div class="section">
        <p><strong>About Me:</strong></p>
        <p>A passionate student/developer with interest in coding and problem solving.</p>
    </div>

    <div class="section skills">
        <p><strong>Skills:</strong></p>
        <span>HTML</span>
        <span>CSS</span>
        <span>JavaScript</span>
        <span>Python</span>
    </div>
</div>

</body>
</html>
